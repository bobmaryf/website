<html>
<head>

<title>InOrOut</title>

  <canvas id="Universe" width="610" height="610" style="position: absolute"></canvas>

</head>

<body onload="setup()">

<script>;

//Global variables
  var xbase = 230;
  var ybase = 600;
  var ytop = 8;
  var canv = document.getElementById('Universe');
  canv.style.left = xbase;
  canv.style.top = 0;
  var context = canv.getContext('2d');
  var centerX = 304;
  var centerY = 304;
  var delay = 25;
  var pie = Math.PI;
  var twopie = 2.0*Math.PI;
  //Radius of the universe
  var urad = 300;
  // In or out, 0.0 is no motion, 1.0 is out, -1.0 is in
  var inout = -1.0;
  var rotate = false;
  var deltrho = 0.2;
  var delttheta = twopie * 0.0005;
  //Body parameters
  //Radius
  var strad = 1;
  //Number of bodies
  var nbods = 500;
  //Properties of the bodies
  //Radius
  var brad = new Array();
  //X & Y Coordinates
  var bx = new Array();
  var by = new Array();
  //Polar Coords
  var brho = new Array();
  var bdrho = new Array();
  var btheta = new Array();
  var bdtheta = new Array();

//Begin functions

//Set up initial universe
function setup() {
  var ifrunning = document.getElementById("urunning");
  if (ifrunning.style.visibility == "visible") return;
  //Display empty universe
  context.beginPath();
  context.arc(centerX, centerY, urad, 0, twopie, false);
  context.fillStyle = 'black';
  context.fill();
  for(var n=0;n<nbods;n++) {
    brad[n] = strad;
    //Put the body at a random location within the universe
    brho[n] = Math.random() * urad;
    bdrho[n] = Math.random() * deltrho + deltrho;
    btheta[n] = Math.random() * twopie;
    bdtheta[n] = Math.random()*delttheta + delttheta;
    bx[n] = brho[n] * Math.cos(btheta[n]);
    by[n] = brho[n] * Math.sin(btheta[n]);
    //Display it
    context.beginPath();
    context.arc(centerX+bx[n], centerY-by[n], brad[n], 0, twopie, false);
    context.fillStyle = 'white';
    context.fill();
  }
}

//Get the Start/Stop button, toggle the running status
function urun() {
  var ifrunning = document.getElementById("urunning");
  if (ifrunning.style.visibility == "visible") {
    ifrunning.style.visibility = "hidden";
  }
  else {
    ifrunning.style.visibility = "visible";
    runit() ;
  }
}

//Run the universe
function runit() {
  var ifrunning = document.getElementById("urunning");
  //Don't do anything if not running
  if (ifrunning.style.visibility == "hidden") return;
  //Check each body
  for(var k=0;k<nbods;k++) {
    //Get new rho value;
    brho[k] = brho[k] + (bdrho[k] * inout);
    if (brho[k] > urad) brho[k] = 0.0;
    if (brho[k] < 0.0) brho[k] = urad;
    //Get new theta value;
    if (rotate) btheta[k] = btheta[k] + bdtheta[k];
    if (btheta[k] > twopie) btheta[k] = btheta[k] - twopie;
    //Compute new x value
    bx[k] = brho[k] * Math.cos(btheta[k]);
    //Compute new y value
    by[k] = brho[k] * Math.sin(btheta[k]);
  }
  //Clear the field
  context.beginPath();
  context.arc(centerX, centerY, urad, 0, twopie, false);
  context.fillStyle = 'black';
  context.fill();
  //Display each body in its current position and size
  for(var n=0;n<nbods;n++) {
    context.beginPath();
    context.arc(centerX+bx[n], centerY-by[n], brad[n], 0, twopie, false);
    context.fillStyle = 'white';
    context.fill();
  }
  //Set to reenter after a wait    
  var timer = setTimeout("runit()",delay);
}

//Set In/Out option
function optinout() {
  if (io.optio.selectedIndex == 0) inout = -1.0;
  else inout = 1.0;
}

//Turn Rotate on or off
function rottoggle() {
  var ifrot = document.getElementById("rottog").checked;
  if (ifrot) rotate = true;
  else rotate = false;
}

</script>

  <!-- Space for control form, an empty table with a border -->
  <div style="position: absolute; left: 10; top: 10;">
  <table border="2" width="210">
    <tr>
      <td height="230" width="170"><div style="visibility: hidden; position: relative;">&nbsp;</div></td>
    </tr>
  </table>
  </div>

  <!-- Control form -->
  <div style="position: absolute; left: 24; top: 20; height: 180; width: 170">
      <span style="font-family: sans-serif; font-size: 12px; color: #000000; font-weight: bold;">
      <span style="font-size: 20px">InOrOut</span><br><br>
      <form name="io">
        <select name="optio" size="2" onchange="javascript:optinout()">
          <option selected value="0">In</option>
          <option value="1">Out</option>
        </select>
      </form>
      <form name="togglerot" method="post" enctype="text/plain">
         <input type="checkbox" unchecked id="rottog" onchange="javaScript:rottoggle();">Rotate<br>
      </form>
      <form name="ureset" action="javaScript:setup();" method="post" enctype="text/plain">
        <input type="submit" value="Reset">
      </form>
      <form name="startstop" action="javaScript:urun();" method="post" enctype="text/plain">  
        <input type="submit" value="Start/Stop">
      </form>
      <span id="urunning" style="font-family: sans-serif; font-size: 14px; color: #ff0000; visibility: hidden">  Running </span>
      </span>
  </div>

</body>

</html>
