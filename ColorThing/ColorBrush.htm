<html>

<head>

<title>ColorBrush</title>

  <canvas id="Universe" width="610" height="610" style="position: absolute"></canvas>

</head>

<body onload="setup()">

<script>;

//Global variables
  var xbase = 230;
  var ybase = 600;
  var ytop = 8;
  var canv = document.getElementById('Universe');
  canv.style.left = xbase;
  canv.style.top = 0;
  var context = canv.getContext('2d');
  var centerX = 304;
  var centerY = 304;
  var xoffst = -6;
  var yoffst = -8;
  var delay = 20;
  var pie = Math.PI;
  var twopie = 2.0*Math.PI;
  //Radius of the visible universe
  var urad = 300.0;
  //Gravitational constant
  var grav = 0.1;
  //Body parameters
  //Mass of bodies
  var stmass = 700.0;
  var bmass = new Array();
  //Number of bodies
  var nbods = 5;
  var totmass = 0.0;
  var rmin = 4.0;
  var rmax = 12.0;
  var rinc = 0.05;
  var rincd = 1.0;
  //Radius of bodies for display
  var disprad = rmin;
  //Theoretical radius for calculations
  var theorad = 36.0;
  //Properties of the bodies
  //X & Y Coordinates
  var bx = new Array();
  var newbx = new Array();
  var by = new Array();
  var newby = new Array();
  //Polar Coords
  var brho = new Array();
  var btheta = new Array();
  //Previous delta x and y
  //Defines speed and direction of body
  var prevdx = new Array();
  var prevdy = new Array();
  var prevdr = new Array();
  //Gravitational forces between bodies
  var forces = new Array();
  //Direction, zero is to the right
  //Direction increases counter-clockwise
  //Complete circle is 2*Pi
  var dirs = new Array();
  //Color palette values
  var reds = new Array();
  var grns = new Array();
  var blus = new Array();
  var clrix = 0;
  var clrinc = 1;

//Begin functions

//Set up initial universe
function setup() {
  var ifrunning = document.getElementById("urunning");
  if (ifrunning.style.visibility == "visible") return;
  //Display empty universe
  context.beginPath();
  context.arc(centerX, centerY, urad, 0, twopie, false);
  context.fillStyle = 'black';
  context.fill();
  clrix = 0;
  disprad = rmin;
  optcolors();
  totmass = 0.0;
  //Add bodies
  for(var n=0;n<nbods;n++) {
    bmass[n] = stmass + 0.01*stmass*Math.random();
    totmass = totmass + bmass[n];
    //Put the bodies in a symmetrical pattern
    brho[n] = urad - 160.0;
    btheta[n] = (n/nbods)*twopie;
    if (n == 0) btheta[n] = twopie*Math.random();
    bx[n] = brho[n] * Math.cos(btheta[n]);
    by[n] = brho[n] * Math.sin(btheta[n]);
  }
  for(var n=0;n<nbods;n++) {
    //Set up each body for a stable orbit around the center
    //Turns out, the influence of the other bodies won't let that happen
    //Except when there are only two bodies
    //Centrifugal force needed for orbit
    var tforce = (grav*bmass[n]*bmass[n])/((2.0*brho[n])*(2.0*brho[n]));
    //Angular velocity for orbit
    dtheta = Math.sqrt(tforce/(brho[n]*bmass[n]));
    //Initial X,Y velocity
    var tx =  brho[n] * Math.cos(btheta[n] + dtheta);
    var ty =  brho[n] * Math.sin(btheta[n] + dtheta);
    prevdx[n] = tx - bx[n];
    prevdy[n] = ty - by[n];
  }
}

//Move and display a body
function movbod(n) {
  //Display the circle
  disprad = disprad + rinc*rincd;
  if (disprad > rmax) rincd = -1.0;
  if (disprad < rmin) rincd = 1.0;
  var drad = disprad;
  context.beginPath();
  context.arc(centerX+bx[n], centerY-by[n], drad, 0, twopie, false);
  context.fillStyle = 'rgb('+reds[clrix]*255/100+','+grns[clrix]*255/100+','+blus[clrix]*255/100+')';
  context.fill();
  clrix = clrix + clrinc;
  if (clrix > 999) clrix = 0;
}

//Get the Start/Stop button, toggle the running status
function urun() {
  var ifrunning = document.getElementById("urunning");
  if (ifrunning.style.visibility == "visible") {
    ifrunning.style.visibility = "hidden";
  }
  else {
    ifrunning.style.visibility = "visible";
    runit() ;
  }
}

//Run the bodies
function runit() {
  var ifrunning = document.getElementById("urunning");
  //Don't do anything if not running
  if (ifrunning.style.visibility == "hidden") return;
  //Check each body
  for(var k=0;k<nbods;k++) {
    var dist = 0.0;
    var ix = 0;
    var deltx = 0.0
    var delty = 0.0
    //Calculate attractions and directions from the other bodies
    for(var n=0;n<nbods;n++) {
      if (n == k) continue;
      dist = getdst(bx[k],by[k],bx[n],by[n]);
      var olfact = 1.0;
      //When bodies overlap, decrease their attraction
      if (dist < theorad) {
        olfact = dist/theorad;
        dist = theorad;
      }
      forces[ix] = olfact*(grav*bmass[k]*bmass[n])/(dist*dist);
      dirs[ix] = sgetdir(bx[k],by[k],bx[n],by[n]);
      ix++;
    }
    //Get change in x and y based on attracting forces
    deltx = prevdx[k]*bmass[k];
    delty = prevdy[k]*bmass[k];
    for (var p=0;p<ix;p++) {
      deltx = deltx + Math.sin(dirs[p])*forces[p];
      delty = delty + Math.cos(dirs[p])*forces[p];
    }
    //Compute new x value
    deltx = deltx/bmass[k];
    prevdx[k] = deltx;
    newbx[k] = bx[k] + deltx;
    //Compute new y value
    delty = delty/bmass[k];
    prevdy[k] = delty;
    newby[k] = by[k] + delty;
    prevdr[k] = Math.sqrt((prevdx[k]*prevdx[k]) + (prevdy[k]*prevdy[k])); 
  }
  //Update the positions
  for(var n=0;n<nbods;n++) {
    bx[n] = newbx[n];
    by[n] = newby[n]
    brho[n] = Math.sqrt(bx[n]*bx[n]+by[n]*by[n]);
    btheta[n] = Math.atan2(by[n],bx[n]);
  }
  var totx = 0.0;
  var toty = 0.0;
  //find the center of mass
  for(var n=0;n<nbods;n++) {
    totx = totx + (bx[n]*bmass[n]);
    toty = toty + (by[n]*bmass[n]);
  }
  //Adjust to the center
  var adjx = totx / totmass;
  var adjy = toty / totmass;
  //Display each body in its current position
  for(var n=0;n<nbods;n++) {
    bx[n] = bx[n] - adjx;
    by[n] = by[n] - adjy;
    brho[n] = Math.sqrt(bx[n]*bx[n]+by[n]*by[n]);
    btheta[n] = Math.atan2(by[n],bx[n]);
    //If it hits the edge, turn it around
    if (brho[n] >= (urad-disprad)) {
      brho[n] = urad - disprad - 1.0;
      bx[n] = brho[n] * Math.cos(btheta[n]);
      by[n] = brho[n] * Math.sin(btheta[n]);
      if (prevdr[n] > 0.0) prevdr[n] = 0.0 - prevdr[n];
      prevdx[n] = prevdr[n] * Math.cos(btheta[n]);
      prevdy[n] = prevdr[n] * Math.sin(btheta[n]);
    } 
    //Display only body zero 
    if (n == 0) movbod(n);
  }
  //Set to reenter after a wait 
  var timer = setTimeout("runit()",delay);
}

//Calculate signed direction from point 1 to point 2
//Counterclockwise is positive
function sgetdir(x1,y1,x2,y2) {
  if (x2 >= x1) {
    if (y2 >= y1) { 
      return pie/2 - Math.atan((y2 - y1)/(x2 - x1)) ;
    }
    else {
      return pie - Math.atan((x2 - x1)/(y1 - y2)) ;
    }
  }
  if (y2 >= y1) { 
    return 0 - Math.atan((x1 - x2)/(y2 - y1)) ;
  }
  else {
    return pie*1.5 - Math.atan((y1 - y2)/(x1 - x2)) ;
  }
}

//Calculate distance between two points
function getdst(x1,y1,x2,y2) {
  var xdif = x1-x2 ;
  var ydif = y1-y2 ;
  return Math.sqrt(xdif*xdif + ydif*ydif) ;
}

  function optcolors() {
    //Set up selected color scheme
    if (colrcontrol.optclrs.selectedIndex == 0) highc();
    if (colrcontrol.optclrs.selectedIndex == 1) primaries();
    if (colrcontrol.optclrs.selectedIndex == 2) pastels();
    if (colrcontrol.optclrs.selectedIndex == 3) colors();
  }

  function colors() {
    //Set up color palette to represent the visible spectrum of light
    clrinc = 7;
  for (var d=0; d<1000; d++) {
  // convert wavelength of 380 to 780 nm into an rgb value
        var r,
            g,
            b,
            alpha,
            colorSpace,
            wl,
            gamma = 1;
        wl = 380 + (d/1000)*(780-380); 
        if (wl >= 380 && wl < 440) {
            R = -1 * (wl - 440) / (440 - 380);
            G = 0;
            B = 1;
       } else if (wl >= 440 && wl < 490) {
           R = 0;
           G = (wl - 440) / (490 - 440);
           B = 1;  
        } else if (wl >= 490 && wl < 510) {
            R = 0;
            G = 1;
            B = -1 * (wl - 510) / (510 - 490);
        } else if (wl >= 510 && wl < 580) {
            R = (wl - 510) / (580 - 510);
            G = 1;
            B = 0;
        } else if (wl >= 580 && wl < 645) {
            R = 1;
            G = -1 * (wl - 645) / (645 - 580);
            B = 0.0;
        } else if (wl >= 645 && wl <= 780) {
            R = 1;
            G = 0;
            B = 0;
        } else {
            R = 0;
            G = 0;
            B = 0;
        }
        // intensty is lower at the edges of the visible spectrum.
        if (wl > 780 || wl < 380) {
            alpha = 0;
        } else if (wl > 700) {
            alpha = (780 - wl) / (780 - 700);
        } else if (wl < 420) {
            alpha = (wl - 380) / (420 - 380);
        } else {
            alpha = 1;
        }
        reds[999-d] = R*100*alpha;
        grns[999-d] = G*100*alpha;
        blus[999-d] = B*100*alpha;
    }
  }

  function primaries() {
    //Set up color palette in the basic RGB combinations
    clrinc = 3;
    for (var n=0; n<100; n++) {
      var p = n;
      //blue to magenta
      reds[p] = n;
      grns[p] = 0;
      blus[p] = 100;
      p = p + 100;
      //magenta to red
      reds[p] = 100;
      grns[p] = 0;
      blus[p] = 100 - n;
      p = p + 100;
      //red to yellow
      reds[p] = 100;
      grns[p] = n;
      blus[p] = 0;
      p = p + 100;
      //yellow to green
      reds[p] = 100 - n;
      grns[p] = 100;
      blus[p] = 0;
      p = p + 100;
      //green to cyan
      reds[p] = 0;
      grns[p] = 100;
      blus[p] = n;
      p = p + 100;
      //cyan to blue
      reds[p] = 0;
      grns[p] = 100 - n;
      blus[p] = 100;
      p = p + 100;
      //blue to magenta again
      reds[p] = n;
      grns[p] = 0;
      blus[p] = 100;
      p = p + 100;
      //magenta to red again
      reds[p] = 100;
      grns[p] = 0;
      blus[p] = 100 - n;
      p = p + 100;
      //red to yellow again
      reds[p] = 100;
      grns[p] = n;
      blus[p] = 0;
      p = p + 100;
      //yellow to green again
      reds[p] = 100 - n;
      grns[p] = 100;
      blus[p] = 0;
    }
    fixclrs();
  }

  function pastels() {
    //Set up color palette in RGB combinations, shading to white between transitions
    clrinc = 3;
    for (var n=0; n<50; n++) {
      var p = n;
      var q = p + 50;
      //0 - blue to magenta
      reds[p] = n*2;
      grns[p] = n*2;
      blus[p] = 100;
      reds[q] = 100;
      grns[q] = 100 - n*2;
      blus[q] = 100;
      p = p + 100;
      q = p + 50;
      //100 - magenta to red
      reds[p] = 100;
      grns[p] = n*2;
      blus[p] = 100;
      reds[q] = 100;
      grns[q] = 100 - n*2;
      blus[q] = 100 - n*2;
      p = p + 100;
      q = p + 50;
      //200 - red to yellow
      reds[p] = 100;
      grns[p] = n*2;
      blus[p] = n*2;
      reds[q] = 100;
      grns[q] = 100;
      blus[q] = 100 - n*2;
      p = p + 100;
      q = p + 50;
      //300 - yellow to green
      reds[p] = 100;
      grns[p] = 100;
      blus[p] = n*2;
      reds[q] = 100 - n*2;
      grns[q] = 100;
      blus[q] = 100 - n*2;
      p = p + 100;
      q = p + 50;
      //400 - green to cyan
      reds[p] = n*2;
      grns[p] = 100;
      blus[p] = n*2;
      reds[q] = 100 - n*2;
      grns[q] = 100;
      blus[q] = 100;
      p = p + 100;
      q = p + 50;
      //500 - cyan to blue
      reds[p] = n*2;
      grns[p] = 100;
      blus[p] = 100;
      reds[q] = 100 - n*2;
      grns[q] = 100 - n*2;
      blus[q] = 100;
      p = p + 100;
      q = p + 50;
      //600 - blue to magenta again
      reds[p] = n*2;
      grns[p] = n*2;
      blus[p] = 100;
      reds[q] = 100;
      grns[q] = 100 - n*2;
      blus[q] = 100;
      p = p + 100;
      q = p + 50;
      //700 - magenta to red again
      reds[p] = 100;
      grns[p] = n*2;
      blus[p] = 100;
      reds[q] = 100;
      grns[q] = 100 - n*2;
      blus[q] = 100 - n*2;
      p = p + 100;
      q = p + 50;
      //800 - red to yellow again
      reds[p] = 100;
      grns[p] = n*2;
      blus[p] = n*2;
      reds[q] = 100;
      grns[q] = 100;
      blus[q] = 100 - n*2;
      p = p + 100;
      q = p + 50;
      //900 - yellow to green again
      reds[p] = 100;
      grns[p] = 100;
      blus[p] = n*2;
      reds[q] = 100 - n*2;
      grns[q] = 100;
      blus[q] = 100 - n*2;
    }
    fixclrs();
  }

  function highc() {
  //Set up high contrast color palette
    clrinc = 1;
    var rv = 70;
    var ri = 5;
    var gv = 40;
    var gi = 6;
    var bv = 10;
    var bi = 6;
    for (var t=0; t<1000; t++) {
      reds[t] = rv;
      rv = rv + ri;
      if ((rv>100) || (rv<10)) ri = -ri;
      grns[t] = gv;
      gv = gv + gi;
      if ((gv>100) || (gv<10)) gi = -gi;
      blus[t] = bv;
      bv = bv + bi;
      if ((bv>100) || (bv<10)) bi = -bi;
    }
    //Smooth out the transition from end back to beginning
    rv = 20;
    gv = 63;
    bv = 43;
    ri = Math.floor((74-rv)/10);
    gi = Math.floor((45-gv)/10);
    bi = Math.floor((16-bv)/10);
    for (var u=991; u<1000; u++) {
      rv = rv + ri;
      gv = gv + gi;
      bv = bv + bi;
      reds[u] = rv;
      grns[u] = gv;
      blus[u] = bv;
    }
  }

  function fixclrs() {
    //Blend end of palette with beginning so wraparound looks ok
    var redch = (reds[1]-reds[950])/50.0;
    var grnch = (grns[1]-grns[950])/50.0;
    var bluch = (blus[1]-blus[950])/50.0;
    for (var n=951; n<1000; n++) {
      reds[n] = reds[n-1] + redch;
      grns[n] = grns[n-1] + grnch;
      blus[n] = blus[n-1] + bluch;
    }
  }

</script>

      Colors<br>  
      <select name="optclrs" size="4">
      <option selected value="0">High Contrast
      <option value="1">RGB Combinations
      <option value="2">RGB Pastels
      <option value="3">Visible Light Spectrum
      </select><br>
      </form>
      <form name="ureset" action="javaScript:setup();" method="post" enctype="text/plain">
        <input type="submit" value="Reset">
      </form>
      <form name="startstop" action="javaScript:urun();" method="post" enctype="text/plain">  
         <input type="submit" value="Start/Stop">
      </form>
      <span id="urunning" style="font-family: sans-serif; font-size: 14px; color: #ff0000; visibility: hidden">  Running </span>
      </span>

      <span id="msg" style="position: relative; font-family: sans-serif; font-size: 14px; color: #000000">&nbsp;

  </div>

</body>
