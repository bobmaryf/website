<html>

<head>

<title>MandelZoom</title>
<!-- MandelZoom - A Mandelbrot image generator that zooms into interesting areas -->
<!-- by Bob Fairbairn - A really old programmer -->

  <canvas id="theCanvas" width="600" height="600" style="position: absolute"></canvas>

</head>

<body onload="highc()">

  <script>

  var xbase = 230;
  var ybase = 600;
  var ytop = 5;
  var canv = document.getElementById('theCanvas');
  canv.style.left = xbase;
  canv.style.top = ytop;
  var context = canv.getContext('2d');
  var mandel = context.createImageData(600, 600);
  //Color palette values
  var reds = new Array();
  var grns = new Array();
  var blus = new Array();
  var cratio = 255/100;
  //Image generation parameters
  var itermax = 500;
  var zoom = 1.0;
  var iter = 100;
  var centerx = 0;
  var centery = 0;
  var startcx = 0;
  var startcy = 0;
  //Index into ImageData array mandel
  var mix = 0;
  //Zoom animation on or off
  var zooming = false;
  //Center points and control params for target areas to zoom into
  var ztargx = new Array();
  var ztargy = new Array();
  var miniter = new Array();
  var maxiter = new Array();
  var threshz1 = new Array();
  var threshz2 = new Array();
  var zincs = new Array();
  var maxz = new Array();

  //Parameters for the individual areas
  //Centered Mandelbrot image
  ztargx[0] = 0.0;
  ztargy[0] = 0.0;
  miniter[0] = 70;
  maxiter[0] = 500;
  threshz1[0] = 7.0;
  threshz2[0] = 10.0;
  zincs[0] = 0.015;
  maxz[0] = 7.8;
  //Seahorse Valley
  ztargx[1] = -0.7545666666666667;
  ztargy[1] = -0.09908333333333334;
  miniter[1] = 80.0;
  maxiter[1] = 500;
  threshz1[1] = 40.0;
  threshz2[1] = 60.0;
  zincs[1] = 0.02;
  maxz[1] = 60.0;
  //Seahorse Detail
  ztargx[2] = -0.7624920426666665;
  ztargy[2] = -0.09543444266666666;
  miniter[2] = 42.0;
  maxiter[2] = 500;
  threshz1[2] = 5000.0;
  threshz2[2] = 500000.0;
  zincs[2] = 0.07;
  maxz[2] = 2000000.0;
  //Elephant Parade
  ztargx[3] = 0.3005333333333333;
  ztargy[3] = -0.021599999999999998;
  miniter[3] = 50;
  maxiter[3] = 500;
  threshz1[3] = 20;
  threshz2[3] = 32;
  zincs[3] = 0.02;
  maxz[3] = 40.0;
  //Elephant Detail
  ztargx[4] = 0.2605526066400002;
  ztargy[4] = -0.0017634991666666544;
  miniter[4] = 39;
  maxiter[4] = 500;
  threshz1[4] = 3000;
  threshz2[4] = 1000000;
  zincs[4] = 0.07;
  maxz[4] = 500000000;
  //Far Left Edge
  ztargx[5] = -1.999943522226667;
  ztargy[5] = 0.0;
  miniter[5] = 100;
  maxiter[5] = 500;
  threshz1[5] = 50;
  threshz2[5] = 70;
  zincs[5] = 0.02;
  maxz[5] = 1000000000;
  //Threes
  ztargx[6] = -1.2587052881762928;
  ztargy[6] = -0.358035678546162;
  miniter[6] = 50;
  maxiter[6] = 900;
  threshz1[6] = 1.0;
  threshz2[6] = 150000000;
  zincs[6] = 0.05;
  maxz[6] = 1000000000;
  //Just Wierd
  ztargx[7] = -1.7684012559200004;
  ztargy[7] = -0.0050403080200000045;
  miniter[7] = 50;
  maxiter[7] = 900;
  threshz1[7] = 1.0;
  threshz2[7] = 15000000.0;
  zincs[7] = 0.1;
  maxz[7] = 1050000000.0;
  //Spiral Toward Infinity
  ztargx[8] = -0.7600999985333334;
  ztargy[8] = 0.08049482446666667;
  miniter[8] = 40;
  maxiter[8] = 900;
  threshz1[8] = 1000.0;
  threshz2[8] = 600000.0;
  zincs[8] = 0.04;
  maxz[8] = 1000000;
  //Looks Like Tile
  ztargx[9] = -0.7496683148669999;
  ztargy[9] = 0.09450998826613337;
  miniter[9] = 36;
  maxiter[9] = 800;
  threshz1[9] = 5000.0;
  threshz2[9] = 80000.0;
  zincs[9] = 0.025;
  maxz[9] = 200000;
  //Zoom To One Trillion
  ztargx[10] = -0.7497463700371599;
  ztargy[10] = 0.0945279929179867;
  miniter[10] = 36;
  maxiter[10] = 800;
  threshz1[10] = 800.0;
  threshz2[10] = 10000000.0;
  zincs[10] = 0.1;
  maxz[10] = 1100000000000;
  //Zoom To One Trillion Again
  ztargx[11] = -1.253013984124693;
  ztargy[11] = 0.026183854332913332;
  miniter[11] = 36;
  maxiter[11] = 800;
  threshz1[11] = 1.0;
  threshz2[11] = 1000000000.0;
  zincs[11] = 0.1;
  maxz[11] = 1100000000000;

  //Parameters for zooming
  var zinc = 0.01;
  var zsign = 1.0;
  var itermin = 600;
  var zthresh1 = 0.0;
  var zthresh2 = 0.0;
  var zmax = 0.0;
  var delay = 4;

 //Begin functions

  //Generate an image, based on the x,y center position and zoom factor 
  function genimage() {
    mix = 0;
    zoom = zoom*1.0;
    var zoomf = 1.0/(150.0*zoom);
    startcx = centerx - 2.0/zoom;
    startcy = centery - 2.0/zoom;
    var cx = 0.0;
    var cy = 0.0;
    var i = 0;
    //Loop through the x,y range of the image
    //Y is reversed
    for(var y=599; y>-1; y--) {
      for(var x=0; x<600; x++) {
        cx = startcx + x*zoomf;
        cy = startcy + y*zoomf;
        //Test whether this point is within the Mandelbrot Set
        i = mtest(cx,cy);
        //Fill in the pixel data
        fillpix(i);
      }
    }
    //Write the image
    context.putImageData(mandel, 0, 0);
    if (!zooming) return;
    //Update the zoom factor
    zoom = zoom + zsign*zinc*zoom;
    zoom = Math.floor(zoom*100.0)/100.0;
    if (zoom > zmax) {
zoom = 1.0;
zooming = false;
return;
//      zsign = -1.0;
//      zoom = zoom + zsign*zinc*zoom;
    }
    if (zoom < 1.0) {
      zsign = 1.0
      zoom = 1.0;
    }
    //Update the max iteration value
    if (zoom < zthresh1) iter = itermin;
    if (zoom < zthresh2) {
      if (zoom > zthresh1) {
        var irange = itermax - iter;
        var zfrac = (zoom - zthresh1) / (zthresh2 - zthresh1);
        iter = iter + zfrac*irange;
      }
    }
    //Display the zoom factor
    var intzoom = Math.floor(zoom);
    var strzoom = intzoom.toLocaleString('en-US');
    document.getElementById("zoominp").value = strzoom;
    //Generate next image after delay
    var timer = setTimeout("genimage()",delay);
  }

  //Test point for Mandelbrot Set
  function mtest(xcon,ycon) {
    var zx = 0;
    var zy = 0;
    //Test whether this point is within the Mandelbrot Set 
    for (ii=0;ii<iter;ii++) {
      var xt = zx*zy;
      zx = zx*zx-zy*zy+xcon;
      zy = 2*xt+ycon;
      var testv = zx*zx+zy*zy;
      //If value is increasing, stop iteration, point is outside the set
      if (testv > 4) break;
    }
    return ii;
  }

  //Fill in a pixel
  function fillpix(ii) {
    //The escape value "ii" determines the displayed color
    if (ii > (iter-1.0)) {
      //Reached max iterations
      //Black pixel
      mandel.data[mix]   = 0;
      mandel.data[mix+1] = 0;
      mandel.data[mix+2] = 0;
      mandel.data[mix+3] = 255;
      mix = mix + 4;
    }
    else {
      //Escaped before reaching max iterations
      //Colored pixel
      //Get color values from palette 
      mandel.data[mix]   = reds[ii];
      mandel.data[mix+1] = grns[ii];
      mandel.data[mix+2] = blus[ii];
      mandel.data[mix+3] = 255;
      mix = mix + 4;
    }
  }

  function zoomcall() {
  //Activate or deactivate the zoom action 
    if (zooming) {
      zooming = false;
      return;
    }
    zooming = true;
    genimage();
  }

  function revzoom() {
  //Reverse the zoom 
    if (!zooming) return;
    zsign = -1.0*zsign;
  }

  function highc() {
  //Set up high contrast color palette
    var rv = 70;
    var ri = 5;
    var gv = 40;
    var gi = 6;
    var bv = 10;
    var bi = 6;
    for (var t=0; t<1000; t++) {
      reds[t] = rv*cratio;
      rv = rv + ri;
      if ((rv>100) || (rv<10)) ri = -ri;
      grns[t] = gv*cratio;
      gv = gv + gi;
      if ((gv>100) || (gv<10)) gi = -gi;
      blus[t] = bv*cratio;
      bv = bv + bi;
      if ((bv>100) || (bv<10)) bi = -bi;
    }
    //White for out of limits
    reds[0] = 100*cratio;
    grns[0] = 100*cratio;
    blus[0] = 100*cratio;
    //Display starting image
    zooming = false;
    opttargets();
  }

  function opttargets() {
    //Set up to display selected target area
    if (zooming) return;
    var ix = targcontrol.opttargs.selectedIndex;
    centerx = ztargx[ix];
    centery = ztargy[ix];
    itermin = miniter[ix];
    itermax = maxiter[ix];
    zthresh1 = threshz1[ix];
    zthresh2 = threshz2[ix];
    zinc = zincs[ix];
    zmax = maxz[ix];
    //Display starting image
    zoom = 1.0;
    zsign = 1.0;
    document.getElementById("zoominp").value = "1";
    document.getElementById("xdisplay").value = centerx;
    document.getElementById("ydisplay").value = centery;
    genimage();
  }
   
  </script>

  <!-- Control form -->
  <div style="position: absolute; left: 24; top: 20; width: 170">
    <span style="font-family: sans-serif; font-size: 16px; color: #000000; font-weight: bold;">
      <span style="font-size: 20px">MandelZoom</span><br><br>
      <form name="targcontrol" method="post" enctype="text/plain">
        Target Areas<br>  
        <select name="opttargs" size="12" onchange="javascript:opttargets()">
          <option selected value="0">Centered Mandelbrot Image&nbsp;</option>
          <option value="1">Seahorse Valley</option>
          <option value="2">Seahorse Detail</option>
          <option value="3">Elephant Parade</option>
          <option value="4">Elephant Detail</option>
          <option value="5">Far Left Edge</option>
          <option value="6">Threes</option>
          <option value="7">Just Wierd</option>
          <option value="8">Spiral Toward Infinity</option>
          <option value="9">Looks Like Tile</option>
          <option value="10">Zoom To One Trillion</option>
          <option value="11">Zoom To One Trillion Again</option>
        </select><br>
      </form>
      <form name="togglezoom" action="javaScript:zoomcall();" method="post" enctype="text/plain">
         <input type="submit" value="Zoom On/Off"><br>
      </form>
      <form name="reversezoom" action="javaScript:revzoom();" method="post" enctype="text/plain">
         <input type="submit" value="Reverse Zoom"><br>
      </form>
      <form name="zoomcontrol" method="post" enctype="text/plain">
        Zoom Factor
          &nbsp;&nbsp;<input disabled type="text" id="zoominp" value="1" size="16" >
        <br><br>Mandelbrot Constants
        <br>X(Real)<br><input disabled type="number" id="xdisplay" value="1" size="16" step="any">
        <br>Y(Imaginary)<br><input disabled type="number" id="ydisplay" value="1" size="16" step="any">
      </form>
    </span>
  </div>

</body>

</html>
